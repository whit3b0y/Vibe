name: funding-farming-analysis

on:
  push:
    branches:
      - claude/funding-farming-analysis-byt2Z
    paths:
      - "funding_farming_xyz100.py"
      - ".github/workflows/funding-farming.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run analysis (full history)
        run: python funding_farming_xyz100.py --dump raw_funding_xyz100.json | tee funding_farming_report.txt
      - name: Run analysis (30 day window)
        run: python funding_farming_xyz100.py --days 30 | tee -a funding_farming_report.txt
      - name: Run analysis (7 day window)
        run: python funding_farming_xyz100.py --days 7 | tee -a funding_farming_report.txt
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add funding_farming_report.txt raw_funding_xyz100.json
          git commit -m "Update funding farming report" || echo "no changes"
          git push
